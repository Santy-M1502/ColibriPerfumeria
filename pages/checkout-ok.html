<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colibrí — Pago confirmado</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/buttons.css"/>
  <link rel="stylesheet" href="../css/navbar.css"/>
  <link rel="stylesheet" href="../css/footer.css"/>
  <style>
    .ok-wrap {
      position: relative; z-index: 1;
      min-height: 70vh; display: flex;
      align-items: center; justify-content: center;
      padding: 6rem 2rem;
    }
    .ok-card {
      background: rgba(13,27,46,0.7);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 20px; padding: 3.5rem;
      text-align: center; max-width: 500px; width: 100%;
      backdrop-filter: blur(12px);
    }
    .ok-icon { font-size: 4rem; margin-bottom: 1.25rem; }
    .ok-title {
      font-family: var(--font-display); font-size: 2.2rem;
      font-weight: 300; color: var(--white); margin-bottom: 0.75rem;
    }
    .ok-sub {
      font-size: 0.92rem; color: rgba(240,248,255,0.5);
      line-height: 1.8; margin-bottom: 2rem;
    }
    .ok-pending {
      background: rgba(251,146,60,0.1); border: 1px solid rgba(251,146,60,0.25);
      border-radius: 10px; padding: 0.85rem 1rem;
      font-size: 0.82rem; color: rgba(251,146,60,0.85);
      margin-bottom: 1.5rem; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <nav id="navbar">
    <a href="/" class="nav-logo">
      <img src="../assets/icons/LogoColibri.png" alt="Colibrí" class="logo-glow"/>
      <span>Colibrí</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/pages/catalogo.html">Catálogo</a></li>
      <li><a href="/pages/combos.html">Combos</a></li>
    </ul>
    <div class="nav-actions">
      <button class="cart-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Carrito <span class="cart-count">0</span>
      </button>
    </div>
  </nav>

  <div class="ok-wrap">
    <div class="ok-card" id="okCard">
      <!-- Se rellena por JS según el status de MP -->
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <a href="/" class="footer-logo">
        <img src="../assets/icons/LogoColibri.png" alt="Colibrí"/>
        <span>Colibrí</span>
      </a>
      <div class="footer-divider"></div>
      <p class="footer-copy">© 2025 Colibrí — Todos los derechos reservados</p>
    </div>
  </footer>

  <script src="../js/stars.js"></script>
  <script src="../js/navbar.js"></script>
  <script>
    const params     = new URLSearchParams(window.location.search);
    const status     = params.get('collection_status') || params.get('status') || 'approved';
    const card       = document.getElementById('okCard');

    // Limpiar carrito siempre que lleguemos acá desde MP
    localStorage.removeItem('colibri_cart');
    document.querySelectorAll('.cart-count').forEach(el => el.textContent = '0');

    if (status === 'approved') {
      card.innerHTML = `
        <div class="ok-icon">🎉</div>
        <div class="ok-title">¡Pago aprobado!</div>
        <p class="ok-sub">
          Tu pedido fue confirmado exitosamente.<br/>
          Te contactamos pronto para coordinar el envío o retiro.
        </p>
        <a href="/" class="btn btn-primary" style="display:inline-flex;justify-content:center">
          Volver al inicio
        </a>`;
    } else if (status === 'pending' || status === 'in_process') {
      card.innerHTML = `
        <div class="ok-icon">⏳</div>
        <div class="ok-title">Pago pendiente</div>
        <div class="ok-pending">
          Tu pago está siendo procesado. Puede demorar unos minutos.<br/>
          Te avisamos por email cuando se confirme.
        </div>
        <a href="/" class="btn btn-primary" style="display:inline-flex;justify-content:center">
          Volver al inicio
        </a>`;
    } else {
      card.innerHTML = `
        <div class="ok-icon">❌</div>
        <div class="ok-title">Pago no completado</div>
        <p class="ok-sub">
          Hubo un problema con el pago. Podés intentarlo de nuevo
          o elegir otro método de pago.
        </p>
        <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap">
          <a href="/pages/checkout.html" class="btn btn-primary" style="display:inline-flex">
            Reintentar
          </a>
          <a href="/" class="btn btn-ghost" style="display:inline-flex">
            Inicio
          </a>
        </div>`;
    }
  </script>
</body>
</html>
